syntax = "proto3";
package knockturnmc;

option go_package = "./proto";

message ServerStatusRequest {
	message Response {
		ServerStatus status = 1;
	}
}

message ServerPlayerRequest {
	message Response {
		repeated Player players = 1;
	}
}

message Player {
	UUID uuid = 1;
	string name = 2;
}

message UUID {
	uint64 low = 1;
	uint64 high = 2;
}

enum ServerStatus {
	STARTING = 0;
	RUNNING = 1;
	STOPPING = 2;
}
